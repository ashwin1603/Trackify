services:
  postgres:
    image: postgres:16-alpine
    container_name: secure_bug_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secure_bug_tracker
    # Use 5433 on host so a local PostgreSQL on 5432 does not steal connections
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
